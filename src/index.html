<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>My first three.js app</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body id="container">
<main>
    <span id="WebGLWarning" style="display: none;"></span>
    <canvas id="c"></canvas>
    <section class="GUI">
        <h2>
            <button id="mode-btn">Current mode: Place</button>
        </h2>
        <div class="color-picker">
            <button data-color="red" class="color-button">Red</button>
            <button data-color="blue" class="color-button">Blue</button>
            <button data-color="green" class="color-button">Green</button>
        </div>
        <div>
            <label for="username">
                <span></span>
            </label>
            <input type="text" id="username" name="username" placeholder="username">
            <button id="connectWS">Connect to server.</button>
        </div>
    </section>
</main>
</body>
</html>
<script type="module" src="js/main.js"></script>
