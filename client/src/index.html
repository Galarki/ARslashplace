<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>arslashplace</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body id="container">
<header>
    <nav>
        <ul>
            <li><a id="active-tab" href="#">Home</a></li>
            <li><a href="./about">About</a></li>
            <li><a href="./changelogs">Changelogs</a></li>
        </ul>
        <span id="line"></span>
        <span id="WebGLWarning" style="display: none;"></span>
        <canvas id="c"></canvas>
        <section class="GUI">
            <div>
                <h2>Current mode:</h2>
                <button id="mode-btn">Place</button>
            </div>
            <div class="color-picker">
                <h2>Color picker</h2>
                <button data-color="red" class="color-button" id="active" ></button>
                <button data-color="blue" class="color-button"></button>
                <button data-color="green" class="color-button"></button>
            </div>
            <div style="display: flex; flex-direction: column">
                <h2>Username</h2>
                <label for="username">
                    <span></span>
                </label>
                <input type="text" id="username" name="username" placeholder="username">
                <button id="connectWS">Connect to server.</button>
            </div>
<!--            <div style="height: 10rem; width: 10rem" id="minimap"></div>-->
        </section>
    </nav>
</header>
<main>
</main>
</body>
</html>
<script type="module" src="js/main.js"></script>
